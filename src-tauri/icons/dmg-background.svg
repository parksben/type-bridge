<svg xmlns="http://www.w3.org/2000/svg" width="760" height="480" viewBox="0 0 760 480" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fffaf5"/>
      <stop offset="48%" stop-color="#f7efe7"/>
      <stop offset="100%" stop-color="#efe2d7"/>
    </linearGradient>
    <linearGradient id="brandGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f2682b"/>
      <stop offset="100%" stop-color="#d9480f"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.88"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.58"/>
    </linearGradient>
    <radialGradient id="warmGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#f2682b" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#f2682b" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-25%" width="140%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#6f2f14" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="760" height="480" fill="url(#bgGrad)"/>
  <circle cx="94" cy="74" r="190" fill="url(#warmGlow)"/>
  <circle cx="714" cy="410" r="210" fill="#ffffff" fill-opacity="0.38"/>

  <path d="M 52 122 C 150 84 224 88 302 124 C 382 161 466 162 582 102 C 628 78 678 70 724 84"
        stroke="#d9480f" stroke-opacity="0.10" stroke-width="18" stroke-linecap="round"/>
  <path d="M 34 376 C 142 332 236 334 334 376 C 430 418 536 423 708 354"
        stroke="#f2682b" stroke-opacity="0.07" stroke-width="24" stroke-linecap="round"/>

  <g transform="translate(54 54)">
    <rect x="0" y="0" width="42" height="42" rx="12" fill="url(#brandGrad)"/>
    <path d="M 11 30 L 11 15 A 10 10 0 0 1 31 15 L 31 30"
          stroke="#ffffff" stroke-width="4.5" stroke-linecap="round" fill="none"/>
    <text x="58" y="16" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif"
          font-size="17" font-weight="700" fill="#27140c">TypeBridge</text>
    <text x="58" y="38" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif"
          font-size="11" font-weight="500" fill="#8d6754" letter-spacing="1.8">聊天即打字</text>
  </g>

  <text x="380" y="106" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif"
        font-size="24" font-weight="700" fill="#2d170e">
    拖拽安装 TypeBridge
  </text>
  <text x="380" y="136" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif"
        font-size="13" font-weight="500" fill="#8a6350">
    将左侧应用拖到右侧 Applications 文件夹，即可完成安装
  </text>

  <g filter="url(#softShadow)">
    <rect x="94" y="164" width="224" height="188" rx="32" fill="url(#cardGrad)" stroke="#ffffff" stroke-opacity="0.88"/>
    <rect x="442" y="164" width="224" height="188" rx="32" fill="url(#cardGrad)" stroke="#ffffff" stroke-opacity="0.88"/>
  </g>

  <circle cx="206" cy="238" r="72" fill="#ffffff" fill-opacity="0.38" stroke="#f2682b" stroke-opacity="0.09"/>
  <circle cx="554" cy="238" r="72" fill="#ffffff" fill-opacity="0.38" stroke="#f2682b" stroke-opacity="0.09"/>

  <g>
    <path d="M 344 238 L 404 238" stroke="#d9480f" stroke-width="3" stroke-linecap="round"/>
    <path d="M 392 227 L 407 238 L 392 249" stroke="#d9480f" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <circle cx="374" cy="238" r="26" fill="#f2682b" fill-opacity="0.08"/>
  </g>

  <text x="380" y="384" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif"
        font-size="10.5" font-weight="600" fill="#8f5a43">
    本应用目前未经过 Apple 公证，首次启动前请进入系统设置 &gt; 隐私与安全性
  </text>
  <text x="380" y="403" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif"
        font-size="10.5" font-weight="600" fill="#8f5a43">
    找到被拦截的 TypeBridge，点击「仍要打开」
  </text>
</svg>
