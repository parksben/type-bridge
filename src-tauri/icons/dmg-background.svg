<svg xmlns="http://www.w3.org/2000/svg" width="1520" height="1080" viewBox="0 0 760 540" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fffaf5"/>
      <stop offset="48%" stop-color="#f7efe7"/>
      <stop offset="100%" stop-color="#efe2d7"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.92"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.62"/>
    </linearGradient>
    <radialGradient id="warmGlow1" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#f2682b" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#f2682b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="warmGlow2" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#6f2f14" flood-opacity="0.09"/>
    </filter>
    <filter id="txtShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#6f2f14" flood-opacity="0.07"/>
    </filter>
  </defs>

  <!-- 背景渐变 -->
  <rect width="760" height="540" fill="url(#bgGrad)"/>

  <!-- 柔和光晕装饰（非常淡） -->
  <circle cx="110" cy="90" r="200" fill="url(#warmGlow1)"/>
  <circle cx="700" cy="470" r="220" fill="url(#warmGlow2)"/>

  <!-- 顶部安装提示 -->
  <text x="380" y="55"
        text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', sans-serif"
        font-size="18" font-weight="600" fill="#2d170e">
    将 TypeBridge 拖入右侧 Applications 文件夹即可完成安装
  </text>

  <!-- 两个主图标区域卡片 -->
  <!-- 左卡片（TypeBridge.app 图标，中心 180,185） -->
  <!-- 右卡片（Applications 文件夹，中心 530,185） -->
  <g filter="url(#cardShadow)">
    <rect x="70" y="90" width="220" height="190" rx="28"
          fill="url(#cardGrad)" stroke="#ffffff" stroke-opacity="0.85" stroke-width="1"/>
    <rect x="420" y="90" width="220" height="190" rx="28"
          fill="url(#cardGrad)" stroke="#ffffff" stroke-opacity="0.85" stroke-width="1"/>
  </g>

  <!-- 中间箭头 -->
  <line x1="312" y1="185" x2="400" y2="185"
        stroke="#d9480f" stroke-width="2.5" stroke-linecap="round" stroke-opacity="0.70"/>
  <polyline points="389,174 403,185 389,196"
            stroke="#d9480f" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
            fill="none" stroke-opacity="0.70"/>
  <!-- 箭头起点小圆 -->
  <circle cx="312" cy="185" r="3.5" fill="#d9480f" fill-opacity="0.50"/>

  <!-- 分隔区域（非常淡的横线） -->
  <line x1="120" y1="325" x2="640" y2="325"
        stroke="#c8846a" stroke-opacity="0.15" stroke-width="1" stroke-dasharray="4 6"/>


</svg>
