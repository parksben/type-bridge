name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (without v prefix, e.g. 0.2.0)'
        required: true
        type: string
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  GOPROXY: https://goproxy.cn,direct

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
            echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          fi

      - name: Override version in config files
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          sed -i '' "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" src-tauri/tauri.conf.json
          sed -i '' "s/^version = \"[^\"]*\"/version = \"$VERSION\"/" src-tauri/Cargo.toml

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache-dependency-path: |
            feishu-bridge/go.sum
            dingtalk-bridge/go.sum
            wecom-bridge/go.sum

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust target
        uses: actions/cache@v4
        with:
          path: src-tauri/target
          key: ${{ runner.os }}-cargo-target-${{ hashFiles('src-tauri/Cargo.lock', 'src-tauri/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-target-

      - name: Build Go sidecars (all channels, both arches)
        run: |
          set -euxo pipefail
          for bridge in feishu-bridge dingtalk-bridge wecom-bridge; do
            (
              cd "$bridge"
              GOOS=darwin GOARCH=arm64 go build -ldflags '-s -w' \
                -o "../src-tauri/binaries/${bridge}-aarch64-apple-darwin" .
              GOOS=darwin GOARCH=amd64 go build -ldflags '-s -w' \
                -o "../src-tauri/binaries/${bridge}-x86_64-apple-darwin" .
            )
          done
          ls -la src-tauri/binaries/

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri (aarch64)
        run: npm run tauri build -- --target aarch64-apple-darwin

      - name: Build Tauri (x86_64)
        run: npm run tauri build -- --target x86_64-apple-darwin

      - name: Try inject DMG layout (safe fallback)
        run: |
          set -euxo pipefail
          python3 -m venv /tmp/dsstore-venv
          /tmp/dsstore-venv/bin/pip install -q ds_store

          for arch in aarch64 x86_64; do
            DMG_DIR="src-tauri/target/${arch}-apple-darwin/release/bundle/dmg"
            DMG=$(ls "$DMG_DIR"/*.dmg | head -1)
            ORIG="/tmp/dmg-orig-${arch}.dmg"

            cp "$DMG" "$ORIG"
            rm -f /tmp/dmg-rw.dmg /tmp/dmg-out.dmg

            if hdiutil convert "$DMG" -format UDRW -o /tmp/dmg-rw.dmg \
              && hdiutil attach -nobrowse -readwrite /tmp/dmg-rw.dmg -mountpoint /tmp/dmg-mnt \
              && /tmp/dsstore-venv/bin/python scripts/fix_dsstore.py /tmp/dmg-mnt src-tauri/icons/dmg-dsstore \
              && hdiutil detach /tmp/dmg-mnt -force \
              && hdiutil convert /tmp/dmg-rw.dmg -format UDZO -imagekey zlib-level=9 -o /tmp/dmg-out.dmg; then
              mv /tmp/dmg-out.dmg "$DMG"

              # Smoke test the modified DMG. If it fails, rollback to original.
              if ! hdiutil verify "$DMG" >/dev/null 2>&1; then
                echo "Injected DMG verify failed for $arch, rollback to original DMG"
                cp "$ORIG" "$DMG"
              elif ! hdiutil attach -nobrowse -readonly "$DMG" -mountpoint /tmp/dmg-check >/dev/null 2>&1; then
                echo "Injected DMG attach failed for $arch, rollback to original DMG"
                cp "$ORIG" "$DMG"
              elif ! /tmp/dsstore-venv/bin/python - <<'PY'
from ds_store import DSStore
p = '/tmp/dmg-check/.DS_Store'
with DSStore.open(p, 'r') as ds:
    entries = {(e.filename, e.code): e.value for e in ds if e.code == b'Iloc'}
assert entries.get(('TypeBridge.app', b'Iloc')) == (206, 238)
assert entries.get(('Applications', b'Iloc')) == (554, 238)
PY
              then
                echo "Injected DMG DS_Store sanity check failed for $arch, rollback to original DMG"
                cp "$ORIG" "$DMG"
              fi

              hdiutil detach /tmp/dmg-check -force >/dev/null 2>&1 || true
            else
              echo "DMG layout injection failed for $arch, rollback to original DMG"
              hdiutil detach /tmp/dmg-mnt -force >/dev/null 2>&1 || true
              cp "$ORIG" "$DMG"
            fi

            rm -f "$ORIG" /tmp/dmg-rw.dmg /tmp/dmg-out.dmg
          done

      - name: Collect artifacts
        run: |
          mkdir -p release-artifacts
          cp src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg release-artifacts/
          cp src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg release-artifacts/
          ls -la release-artifacts/

      - name: Create/Update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: TypeBridge v${{ steps.version.outputs.VERSION }}
          files: release-artifacts/*.dmg
          fail_on_unmatched_files: true
          make_latest: true
          body: |
            | Architecture | Package |
            |------|--------|
            | Apple Silicon | `TypeBridge_${{ steps.version.outputs.VERSION }}_aarch64.dmg` |
            | Intel | `TypeBridge_${{ steps.version.outputs.VERSION }}_x64.dmg` |
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
