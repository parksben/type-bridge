name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (without v prefix, e.g. 0.2.0)'
        required: true
        type: string
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  GOPROXY: https://goproxy.cn,direct

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
            echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          fi

      - name: Override version in config files
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          sed -i '' "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" src-tauri/tauri.conf.json
          sed -i '' "s/^version = \"[^\"]*\"/version = \"$VERSION\"/" src-tauri/Cargo.toml

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache-dependency-path: |
            feishu-bridge/go.sum
            dingtalk-bridge/go.sum
            wecom-bridge/go.sum

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust target
        uses: actions/cache@v4
        with:
          path: src-tauri/target
          key: ${{ runner.os }}-cargo-target-${{ hashFiles('src-tauri/Cargo.lock', 'src-tauri/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-target-

      - name: Build Go sidecars (all channels, both arches)
        run: |
          set -euxo pipefail
          for bridge in feishu-bridge dingtalk-bridge wecom-bridge; do
            (
              cd "$bridge"
              GOOS=darwin GOARCH=arm64 go build -ldflags '-s -w' \
                -o "../src-tauri/binaries/${bridge}-aarch64-apple-darwin" .
              GOOS=darwin GOARCH=amd64 go build -ldflags '-s -w' \
                -o "../src-tauri/binaries/${bridge}-x86_64-apple-darwin" .
            )
          done
          ls -la src-tauri/binaries/

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri (aarch64)
        run: npm run tauri build -- --target aarch64-apple-darwin

      - name: Build Tauri (x86_64)
        run: npm run tauri build -- --target x86_64-apple-darwin

      - name: Inject DMG icon layout (safe fallback)
        run: bash scripts/inject-dmg-layout.sh
        env:
          TYPEBRIDGE_DMG_VIEW_MODE: iloc

      - name: Collect artifacts
        run: |
          mkdir -p release-artifacts
          cp src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg release-artifacts/
          cp src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg release-artifacts/
          ls -la release-artifacts/

      - name: Create/Update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: TypeBridge v${{ steps.version.outputs.VERSION }}
          files: release-artifacts/*.dmg
          fail_on_unmatched_files: true
          make_latest: true
          body: |
            | Architecture | Package |
            |------|--------|
            | Apple Silicon | `TypeBridge_${{ steps.version.outputs.VERSION }}_aarch64.dmg` |
            | Intel | `TypeBridge_${{ steps.version.outputs.VERSION }}_x64.dmg` |
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish metadata to website
        if: ${{ !contains(steps.version.outputs.VERSION, '-') }}
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          TAG="v${VERSION}"

          # 从 release-artifacts 目录中读文件名
          AARCH64_DMG=$(ls release-artifacts/*_aarch64.dmg 2>/dev/null | head -1)
          X64_DMG=$(ls release-artifacts/*_x64.dmg 2>/dev/null | head -1)

          AARCH64_SIZE=""
          X64_SIZE=""
          if [ -n "$AARCH64_DMG" ]; then
            AARCH64_SIZE=$(stat -f%z "$AARCH64_DMG" 2>/dev/null || wc -c < "$AARCH64_DMG" | tr -d ' ')
            AARCH64_NAME=$(basename "$AARCH64_DMG")
            AARCH64_URL="https://github.com/parksben/type-bridge/releases/download/${TAG}/${AARCH64_NAME}"
          fi

          if [ -n "$X64_DMG" ]; then
            X64_SIZE=$(stat -f%z "$X64_DMG" 2>/dev/null || wc -c < "$X64_DMG" | tr -d ' ')
            X64_NAME=$(basename "$X64_DMG")
            X64_URL="https://github.com/parksben/type-bridge/releases/download/${TAG}/${X64_NAME}"
          fi

          echo "Publishing v${VERSION} to website..."
          echo "  aarch64: ${AARCH64_URL:-N/A} (${AARCH64_SIZE:-N/A} bytes)"
          echo "  x64:     ${X64_URL:-N/A} (${X64_SIZE:-N/A} bytes)"

          PAYLOAD=$(jq -n \
            --arg version "$VERSION" \
            --arg tag_name "$TAG" \
            --arg name "TypeBridge ${TAG}" \
            --arg notes "" \
            --arg published_at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg aarch64 "${AARCH64_URL:-}" \
            --arg aarch64_size "${AARCH64_SIZE:-}" \
            --arg x64 "${X64_URL:-}" \
            --arg x64_size "${X64_SIZE:-}" \
            '{
              version: $version,
              tag_name: $tag_name,
              name: $name,
              notes: $notes,
              published_at: $published_at,
              download_urls: {
                aarch64: (if $aarch64 != "" then $aarch64 else null end),
                x64: (if $x64 != "" then $x64 else null end),
                aarch64_size: (if $aarch64_size != "" then ($aarch64_size | tonumber) else null end),
                x64_size: (if $x64_size != "" then ($x64_size | tonumber) else null end)
              }
            }')

          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "https://typebridge.parksben.xyz/api/publish" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.UPLOAD_SECRET }}" \
            -d "$PAYLOAD")

          if [ "$HTTP_CODE" = "200" ]; then
            echo "Publish OK (HTTP $HTTP_CODE)"
          else
            echo "Publish failed (HTTP $HTTP_CODE) — continuing (non-blocking)"
          fi
        env:
          UPLOAD_SECRET: ${{ secrets.UPLOAD_SECRET }}
